<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dox_Void | Projects</title>
<link rel="stylesheet" href="style.css">
<script src="particles.js" defer></script>
<style>
/* Modal for project open animation */
.modal{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);justify-content:center;align-items:center;z-index:2000;
}
.modal-content{background:#111;padding:30px;border-radius:15px;color:#fff;max-width:600px;width:90%;text-align:center;box-shadow:0 0 30px #00fff0;}
.close-btn{position:absolute;top:20px;right:30px;color:#0ff;font-size:2rem;cursor:pointer;}
</style>
</head>
<body>
<header>
<h1>Dox_Void</h1>
<nav>
<a href="index.html">Home</a>
<a href="about.html">About Me</a>
<a href="projects.html">Projects</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section id="projects">
<h2 class="fade-in">Projects</h2>
<div class="projects">
<div class="project fade-in" data-title="Portfolio Website" data-desc="I made this portfolio website with a unique UI and colors adn to get people to know me.">
<h3>Portfolio Website</h3>
<p>Click to open 📩</p>
</div>
<div class="project fade-in" data-title="Coming Soon!" data-desc="New Project Coming Soon!.">
<h3>Coming Soon!</h3>
<p>Click to open 📩</p>
</div>
<div class="project fade-in" data-title="Coming Soon!" data-desc="New Project Coming Soon!.">
<h3>Coming Soon!</h3>
<p>Click to open 📩</p>
</div>
</div>
</section>

<!-- Modal -->
<div class="modal" id="projectModal">
<div class="modal-content">
<span class="close-btn" id="closeModal">&times;</span>
<h3 id="modalTitle"></h3>
<p id="modalDesc"></p>
</div>
</div>

<footer>
<p>&copy; 2026 Ahraan. All rights reserved <a href="index.html">Home</a> · <a href="about.html">About</a> · <a href="projects.html">Projects</a> · <a href="contact.html">Contact</a></p>
</footer>

<script src="particles.js" defer></script>
<script>
// Modal logic
const modal=document.getElementById('projectModal');
const modalTitle=document.getElementById('modalTitle');
const modalDesc=document.getElementById('modalDesc');
const closeBtn=document.getElementById('closeModal');
document.querySelectorAll('.project').forEach(project=>{
  project.addEventListener('click',()=>{
    modal.style.display='flex';
    modalTitle.textContent=project.dataset.title;
    modalDesc.textContent=project.dataset.desc;
  });
});
closeBtn.addEventListener('click',()=>{modal.style.display='none';});
window.addEventListener('click',e=>{if(e.target==modal)modal.style.display='none';});
</script>
</body>
</html>
